<!DOCTYPE html>
<html lang="en">
<head>
    <title>E-Commerce Web App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>E-Commerce Web Application</h1>
    <p>Nakka Venkata Manikanta</p>
    <p>Kallam Haranadhareddy Institute of Technology</p>
    <p>CGPA: 9.0</p>
</header>

<div class="products">
    <div class="product">
        <h2>Laptop</h2>
        <p>₹45,000</p>
        <button onclick="addToCart('Laptop')">Add to Cart</button>
    </div>

    <div class="product">
        <h2>Mobile</h2>
        <p>₹20,000</p>
        <button onclick="addToCart('Mobile')">Add to Cart</button>
    </div>

    <div class="product">
        <h2>Headphones</h2>
        <p>₹2,000</p>
        <button onclick="addToCart('Headphones')">Add to Cart</button>
    </div>
</div>

<div class="cart">
    <h2>Cart</h2>
    <ul id="cartItems"></ul>
    <button onclick="checkout()">Checkout</button>
</div>

<script src="script.js"></script>
</body>
</html>
